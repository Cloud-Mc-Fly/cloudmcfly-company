services:
  app:
    build: .
    container_name: cloudmcfly-company
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - cloudmcfly

  nginx:
    image: nginx:alpine
    container_name: cloudmcfly-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - cloudmcfly

networks:
  cloudmcfly:
    driver: bridge

volumes:
  app-data:
    driver: local
